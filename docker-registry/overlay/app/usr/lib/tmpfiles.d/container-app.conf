# Seed the active-image env file under /var on first boot.
# /etc is read-only on Avocado, so this writable state lives in /var.
# Type 'f' creates the file only if it does not exist — once container-swap
# has overwritten it with a different image, that value persists across
# reboots until the user resets it.
d /var/lib/container-app 0755 root root -
f /var/lib/container-app/active-image.env 0644 root root - CONTAINER_IMAGE=docker.io/peridionick/hello-flask:py311
