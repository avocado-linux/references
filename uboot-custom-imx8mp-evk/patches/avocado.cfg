# Avocado defconfig overlay for imx8mp_evk_defconfig.
#
# Appended to configs/imx8mp_evk_defconfig before `make`. Only delta
# compared to the upstream NXP defconfig is included here.

# --- Avocado partition layout (EFI/GPT, GUID-keyed roots).
CONFIG_EFI_PARTITION=y
CONFIG_PARTITION_TYPE_GUID=y

# --- HAB (i.MX High Assurance Boot, hardware secure boot).
#
# Enables CSF parsing in SPL/u-boot proper so the boot ROM can verify
# this bootloader against fuses (SRK hash) when HAB is closed. After
# this build you still need to:
#   1. Generate SRK keys/certs with NXP's CST.
#   2. Run `cst -i csf-spl.txt` and `cst -i csf-uboot.txt` on the built
#      flash.bin (NXP uses the imx_log report to find offsets).
#   3. Append the generated CSF blobs to flash.bin at the right offsets.
#   4. Blow SRK fuses on a target board to lock the chain.
# See README.md "Closing HAB" for the full procedure.
CONFIG_IMX_HAB=y

# --- FIT image verification with placeholder pubkey in the U-Boot DTB.
#
# The /signature node in the control DTB (added via
# patches/avocado-fit-signature.dtsi) holds a /key-rt-prod placeholder.
# After this build, run `mkimage -K` against the FIT image you intend to
# load to populate the placeholder with your RSA pubkey:
#
#   mkimage -F -k <keys-dir> -K <built u-boot dtb> -r <fit.itb>
#
# The dtb is then re-baked into flash.bin (via this same compile pass)
# and the bootloader will only boot FIT images signed by the matching
# private key.
CONFIG_FIT=y
CONFIG_FIT_VERBOSE=y
CONFIG_FIT_SIGNATURE=y
CONFIG_FIT_SIGNATURE_MAX_SIZE=0x10000000
CONFIG_RSA=y

# --- Required for FIT verification on the SPL side too (eMMC/SD boot).
CONFIG_SPL_FIT=y
CONFIG_SPL_FIT_SIGNATURE=y
CONFIG_SPL_RSA=y
CONFIG_SPL_RSA_VERIFY=y
CONFIG_SPL_OF_CONTROL=y
CONFIG_SPL_OF_LIBFDT=y

# --- Verbose boot logs help when debugging signed boot. Drop these for
# production builds to shave a few dozen KB off SPL.
CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=7
CONFIG_LOG_DEFAULT_LEVEL=7
