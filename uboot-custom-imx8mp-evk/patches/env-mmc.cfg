# Redundant U-Boot env in MMC.
#
# CONFIG_USE_BOOTCOMMAND keeps the built-in bootcmd as a fallback when
# the MMC env hasn't been written yet (e.g. fresh-from-factory or after
# an erase). On Avocado's flow, the compiled uboot.env supplies the A/B
# slot logic at runtime; the built-in bootcmd just keeps fastboot
# reachable for uuu provisioning when there is no env.
CONFIG_USE_BOOTCOMMAND=y

# Disable other env backends.
# CONFIG_ENV_IS_IN_FLASH is not set
# CONFIG_ENV_IS_IN_SPI_FLASH is not set
CONFIG_ENV_IS_NOWHERE=y
CONFIG_ENV_IS_IN_MMC=y

# 128KB redundant env, located at 4MB / 4.25MB. Matches the partition
# offsets in stone-imx8mp-evk.json's `uboot-env` partition entry.
CONFIG_SYS_REDUNDAND_ENVIRONMENT=y
CONFIG_ENV_SIZE=0x20000
CONFIG_ENV_OFFSET=0x400000
CONFIG_ENV_OFFSET_REDUND=0x440000
