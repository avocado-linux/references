cli_requirement: ">=0.26.0"

default_target: "jetson-orin-nano-devkit"

# Add additional supported targets or use "*" for all targets
supported_targets:
  - jetson-orin-nano-devkit

##
## Distribution
##

distro:
  release: 2024
  channel: edge

##
## Runtimes
##

runtimes:
  dev:
    extensions:
      - avocado-ext-dev
      - avocado-ext-sshd-dev
      - avocado-bsp-{{ avocado.target }}
      - config
      - app
    packages:
      avocado-runtime: "*"

##
## Extensions
##

extensions:
  avocado-ext-dev:
    source:
      type: package
      version: "*"

  avocado-ext-sshd-dev:
    source:
      type: package
      version: "*"

  avocado-bsp-{{ avocado.target }}:
    source:
      type: package
      version: "*"

  app:
    types:
      - sysext
      - confext
    version: "0.1.0"
    summary: "Python GStreamer YOLO object detection dashboard"
    overlay: app/overlay
    packages:
      app:
        compile: app
        install: app-install.sh
      python3: "*"
      python3-pygobject: "*"
      python3-numpy: "*"
      opencv: "*"
      cudnn: "*"
      cuda-cudart: "*"
      gstreamer1.0: "*"
      gstreamer1.0-plugins-good-video4linux2: "*"
      gstreamer1.0-plugins-good-jpeg: "*"
      gstreamer1.0-plugins-good-multipart: "*"
      gstreamer1.0-plugins-base-app: "*"
      gstreamer1.0-plugins-base-videoconvertscale: "*"
      gstreamer1.0-plugins-nvjpeg: "*"
      gstreamer1.0-plugins-nvvidconv: "*"
      kernel-module-uvcvideo: "*"
      v4l-utils: "*"
      curl: "*"
    enable_services:
      - app.service
    on_merge:
      - systemctl restart --no-block app.service
    on_unmerge:
      - systemctl stop app.service

    sdk:
      packages:
        nativesdk-uv: "*"

  # Generated default config extension
  # Use or modify this to configure "real" user accounts (passwd, shadow, group)
  # or configure other system services
  config:
    types:
      - confext
    version: "0.1.0"

    # NOT FOR PRODUCTION: Set root password to empty string
    users:
      root:
        password: ""

##
## SDK
##


  avocado-ext-connect-config:
    types:
      - confext
    version: "0.1.0"
    overlay: overlay


  avocado-ext-connect:
    source:
      type: package
      version: "*"


  avocado-ext-tunnels:
    source:
      type: package
      version: "*"

sdk:
  image: "docker.io/avocadolinux/sdk:{{ config.distro.release }}-{{ config.distro.channel }}"

  container_args:
    - --privileged
    - --network=host
    - -v /dev:/dev
    - -v /sys:/sys

  compile:
    app:
      compile: app-compile.sh
      clean: app-clean.sh

  packages:
    avocado-sdk-toolchain: "*"

