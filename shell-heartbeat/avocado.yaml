default_target: "qemux86-64"

supported_targets: '*'

distro:
  release: 2024
  channel: edge

runtimes:
  dev:
    extensions:
      - avocado-ext-dev
      - avocado-ext-sshd-dev
      - avocado-bsp-{{ avocado.target.board }}
      - config
      - app
      - heartbeat
    packages:
      avocado-runtime: '*'

extensions:
  avocado-ext-dev:
    source:
      type: package
      version: "*"

  avocado-ext-sshd-dev:
    source:
      type: package
      version: "*"

  avocado-bsp-{{ avocado.target.board }}:
    source:
      type: package
      version: "*"

  avocado-ext-connect:
    source:
      type: package
      version: "*"

  avocado-ext-tunnels:
    source:
      type: package
      version: "*"

  app:
    types:
      - sysext
      - confext
    version: "0.1.0"

  config:
    types:
      - confext
    version: "0.1.0"
    overlay: overlay
    users:
      root:
        password: ""

  heartbeat:
    types:
      - sysext
      - confext
    version: "0.1.0"
    summary: "Device heartbeat monitor"
    overlay: heartbeat/overlay
    enable_services:
      - heartbeat.service
    on_merge:
      - systemctl restart --no-block heartbeat.service
    on_unmerge:
      - systemctl stop heartbeat.service

sdk:
  image: docker.io/avocadolinux/sdk:{{ avocado.distro.release }}-{{ avocado.distro.channel }}

  container_args:
    - --network=host
    - --privileged
    - -v /dev:/dev
    - -v /sys:/sys

  packages:
    avocado-sdk-toolchain: '*'
