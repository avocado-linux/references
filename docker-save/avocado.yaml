cli_requirement: ">=0.40.0"

default_target: "raspberrypi5"

supported_targets: "*"

##
## Distribution
##

distro:
  release: 2024
  channel: edge

##
## Runtimes
##

runtimes:
  dev:
    extensions:
      - app
      - config
      - docker
      - avocado-ext-dev
      - avocado-ext-sshd-dev
      - avocado-bsp-{{ avocado.target.board }}
    packages:
      avocado-runtime: "*"

##
## Extensions
##

extensions:
  # Docker engine extension: provides the Docker daemon, ca-certificates,
  # and the kernel modules needed for Docker's bridge networking and iptables
  # NAT/filter rules.
  docker:
    version: 0.1.0

    enable_services:
      - docker.service

    # Blocking try-restart on purpose. The previous form
    # `systemctl restart --no-block docker.service` raced the app
    # extension's on_merge (which calls `docker load` immediately
    # after): systemctl returned before docker was stable, multiple
    # start/stop transitions fired in <10s, and systemd's start-limit
    # tripped → docker permanently `failed (start-limit-hit)`.
    # `try-restart` (no --no-block) waits for docker to settle, and
    # is a no-op when docker isn't running yet (cold boot, where
    # `enable_services` will start it).
    on_merge:
      - systemctl try-restart docker.service

    on_unmerge:
      - systemctl stop docker.service

    overlay: overlay/docker

    packages:
      ca-certificates: '*'
      docker: '*'
      iptables-modules: '*'
      # `kernel-module-br-netfilter` transitively pulls in
      # `kernel-module-bridge` on targets where bridge is a separately
      # loadable module (RPi, Jetson). On targets where bridge is built
      # into the kernel (NXP i.MX, etc.) there is no separate bridge
      # package and the explicit dependency would fail to resolve.
      kernel-module-br-netfilter: '*'
      kernel-module-ip-tables: '*'
      kernel-module-ip6table-filter: '*'
      kernel-module-ip6table-mangle: '*'
      kernel-module-ip6table-nat: '*'
      kernel-module-iptable-filter: '*'
      kernel-module-iptable-mangle: '*'
      kernel-module-iptable-nat: '*'
      # iptable-raw is not required for Docker's default bridge networking
      # and isn't packaged on all targets (kernel build-in vs. module
      # varies by BSP). Add it back if you need iptables raw-table rules.
      kernel-module-nf-conntrack-netlink: '*'
      kernel-module-nf-nat: '*'
      kernel-module-veth: '*'
      kernel-module-xt-addrtype: '*'
      kernel-module-xt-conntrack: '*'
      kernel-module-xt-masquerade: '*'

  # Application extension: loads the saved Docker image tarball into the
  # local engine on first merge, then runs it via the systemd unit.
  app:
    types:
      - sysext
      - confext
    version: "0.1.0"
    summary: "Hello-from-Avocado Python 3.10 + Flask container, loaded from a local docker save tarball at build time"

    enable_services:
      - container-app.service

    on_merge:
      # Tarball ships inside this extension's sysext overlay, so it's
      # delivered atomically with the rest of the extension via OTA. On
      # merge (first boot, sysext refresh, or `avocado deploy`), the engine
      # registers the new image; the service then restarts and picks it up.
      #
      # `systemctl start docker.service` is blocking (no --no-block) and
      # guarantees the daemon is accepting API calls before `docker load`
      # — without it, the load would race startup and silently fail
      # (image never registered), causing container-app.service to fall
      # through to a registry pull at runtime, defeating the whole point
      # of docker-save. With the `docker` extension's on_merge now using
      # blocking `try-restart`, docker is already settled by the time
      # this fires, but keeping `start` here is defense-in-depth and
      # idempotent.
      - systemctl start docker.service
      - docker load -i /usr/lib/container-app/hello.tar
      - systemctl restart --no-block container-app.service

    on_unmerge:
      - systemctl stop container-app.service

    overlay: overlay/app

    var_files:
      - var/lib/docker/**

  # Default config extension. Sets root password to empty for development
  # convenience. Replace before any production deployment.
  config:
    types:
      - confext
    version: "0.1.0"

    # NOT FOR PRODUCTION: Set root password to empty string
    users:
      root:
        password: ""

  avocado-ext-dev:
    source:
      type: package
      version: "*"

  avocado-ext-sshd-dev:
    source:
      type: package
      version: "*"

  avocado-bsp-{{ avocado.target.board }}:
    source:
      type: package
      version: "*"

##
## SDK
##

sdk:
  image: "docker.io/avocadolinux/sdk:{{ config.distro.release }}-{{ config.distro.channel }}"

  container_args:
    - --privileged
    # - --network=host  # disabled by deploy.sh
    - -v /dev:/dev
    - -v /sys:/sys

  packages:
    avocado-sdk-toolchain: "*"
    # `nativesdk-docker` is intentionally omitted: this reference uses
    # `var_files` to seed the already-built tarball into the sysext, not
    # `docker_images` (registry pull), so the host-side docker tool is not
    # needed in the SDK. `nativesdk-docker` is required by `docker-registry`,
    # which does run a registry pull during `avocado build`.
