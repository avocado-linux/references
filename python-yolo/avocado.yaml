cli_requirement: ">=0.26.0"

# Cross-platform default. Override on the CLI with `avocado build -t <target>`.
default_target: "raspberrypi5"

# This reference is designed to run anywhere OpenCV is available. List the
# targets explicitly so `avocado install` resolves them in the right feed.
supported_targets:
  - raspberrypi5
  - imx8mp-evk
  - imx91-frdm
  - imx93-frdm
  - imx93-evk
  - jetson-orin-nano-devkit

##
## Distribution
##

distro:
  release: 2024
  channel: edge

##
## Runtimes
##

runtimes:
  dev:
    extensions:
      - avocado-ext-dev
      - avocado-ext-sshd-dev
      - avocado-bsp-{{ avocado.target }}
      - config
      - app
    packages:
      avocado-runtime: "*"

##
## Extensions
##

extensions:
  avocado-ext-dev:
    source:
      type: package
      version: "*"

  avocado-ext-sshd-dev:
    source:
      type: package
      version: "*"

  avocado-bsp-{{ avocado.target }}:
    source:
      type: package
      version: "*"

  app:
    types:
      - sysext
      - confext
    version: "0.1.0"
    summary: "Cross-platform Python + GStreamer + OpenCV DNN object detection dashboard"
    overlay: app/overlay
    packages:
      app:
        compile: app
        install: app-install.sh

      # Inference: OpenCV's DNN module, CPU only. Works on every Avocado target.
      opencv: "*"

      # GStreamer with the generic V4L2 + JPEG decode plugins (no vendor accel).
      gstreamer1.0: "*"
      gstreamer1.0-plugins-good-video4linux2: "*"
      gstreamer1.0-plugins-good-jpeg: "*"
      gstreamer1.0-plugins-base-app: "*"
      gstreamer1.0-plugins-base-videoconvertscale: "*"

      # Python runtime + numpy + the GStreamer bindings.
      python3: "*"
      python3-pygobject: "*"
      python3-numpy: "*"

      # USB UVC kernel module so most webcams Just Work.
      kernel-module-uvcvideo: "*"

      # Diagnostics.
      v4l-utils: "*"
      curl: "*"

    enable_services:
      - app.service
    on_merge:
      - systemctl restart --no-block app.service
    on_unmerge:
      - systemctl stop app.service

    sdk:
      packages:
        nativesdk-uv: "*"

  # NOT FOR PRODUCTION: empty root password so the demo is reachable over SSH.
  config:
    types:
      - confext
    version: "0.1.0"
    users:
      root:
        password: ""

##
## SDK
##

sdk:
  image: "docker.io/avocadolinux/sdk:{{ config.distro.release }}-{{ config.distro.channel }}"

  container_args:
    - --privileged
    - --network=host
    - -v /dev:/dev
    - -v /sys:/sys

  compile:
    app:
      compile: app-compile.sh
      clean: app-clean.sh

  packages:
    avocado-sdk-toolchain: "*"
