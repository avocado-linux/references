[Service]
Environment=XDG_CONFIG_HOME=/usr/lib/weston-kiosk

# Give weston its own runtime dir so the wayland socket isn't subject to
# logind's per-session cleanup of /run/user/0 (observed: socket file
# disappearing while weston still held the bound unix socket open).
RuntimeDirectory=weston
RuntimeDirectoryMode=0700
Environment=XDG_RUNTIME_DIR=/run/weston
