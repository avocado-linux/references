default_target: qemux86-64
supported_targets:
  - qemux86-64

distro:
  release: 2024
  channel: edge

##
## Runtimes
##

runtimes:
  dev:
    extensions:
      - avocado-ext-dev
      - avocado-ext-sshd-dev
      - avocado-bsp-{{ avocado.target }}
      - config-dev
      - app
    packages:
      avocado-runtime: '*'

    # Cross-compile Linux 6.12.69 from source via the SDK.
    # The compile step runs kernel-compile.sh (which builds bzImage),
    # then the install step copies it to $AVOCADO_RUNTIME_BUILD_DIR.
    kernel:
      compile: kernel
      install: kernel-install.sh

##
## Extensions
##

extensions:
  avocado-ext-dev:
    source:
      type: package
      version: '*'

  avocado-ext-sshd-dev:
    source:
      type: package
      version: '*'

  avocado-bsp-{{ avocado.target }}:
    source:
      type: package
      version: '*'

  app:
    version: 0.1.0

  config-dev:
    version: 0.1.0

    users:
      root:
        password: ''

##
## SDK
##

sdk:
  image: docker.io/avocadolinux/sdk:{{ avocado.distro.release }}-{{ avocado.distro.channel }}

  container_args:
    - --network=host

  compile:
    kernel:
      compile: kernel-compile.sh
      clean: kernel-clean.sh
      packages:
        glibc-dev: '*'
        libelf1: '*'

      package:
        install: kernel-package-install.sh
        version: "6.12.69"
        name: kernel-image-custom
        license: "GPL-2.0-only"
        summary: "Custom Linux kernel 6.12.69 for qemux86-64"
        files:
          - /boot/*

  packages:
    avocado-sdk-toolchain: '*'
    nativesdk-bc: '*'
    nativesdk-libelf1: '*'
